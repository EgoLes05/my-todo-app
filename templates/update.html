{% extends 'base.html' %}

{% block head %}
<title>Task Master- Update Task</title>
{% endblock %}

{% block body %}
<div class="content">
    <h1>Update Task</h1>


    <div class="card">
        <form action="/update/{{task.id}}" method="POST" class="form-inline">
            <input type="text" name="content" id="content" value="{{task.content}}" class="input-text" required>
            <button type="submit" class="btn btn-primary">Update</button>
            <a href="/" class="btn btn-secondary">Cancel</a>
        </form>
    </div>

</div>

{% endblock %}
